version: '3.8'

services:
  app:
    build: .
    container_name: villa-tech-solutions
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/villa_tech_solutions
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      - villa-network

  mongo:
    image: mongo:6-jammy
    container_name: villa-tech-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - villa-network

  nginx:
    image: nginx:alpine
    container_name: villa-tech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - villa-network

volumes:
  mongo-data:

networks:
  villa-network:
    driver: bridge
